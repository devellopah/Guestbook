name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  code-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none

      - uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Update dependencies for PHP 8.3
        run: |
          composer update --with-all-dependencies --no-progress --no-scripts --no-plugins
          composer install --no-progress --no-scripts --no-plugins

      - name: Validate composer
        run: composer validate --strict

      - name: PHP lint
        run: |
          find src tests -name "*.php" -exec php -l {} \; || true

      - name: PHPStan
        run: vendor/bin/phpstan analyse src || true

      - name: PHP CS Fixer
        run: vendor/bin/php-cs-fixer fix --dry-run --diff || true

  security-scan:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.base.sha != github.event.pull_request.head.sha

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --no-verification

  test:
    runs-on: ubuntu-latest
    needs: [code-quality]

    strategy:
      matrix:
        php: ["8.3"]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: test
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
        ports:
          - 3306:3306

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        run: |
          composer update --with-all-dependencies --no-progress --no-scripts --no-plugins
          composer install --no-progress --no-scripts --no-plugins

      - name: Wait for MySQL
        run: |
          until mysqladmin ping -h127.0.0.1 -P3306 -uroot -ppassword --silent; do
            echo "Waiting for MySQL..."
            sleep 5
          done

      - name: Run tests
        run: vendor/bin/phpunit || true

  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t app .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: app
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH

      - name: Upload scan results
        if: ${{ !github.event.pull_request.head.repo.fork && success() }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif

  build:
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          composer update --with-all-dependencies --no-dev --no-progress --no-scripts --no-plugins
          composer install --no-dev --no-progress --no-scripts --no-plugins

      - name: Check index.php syntax
        run: php -l index.php || true

  notify:
    runs-on: ubuntu-latest
    needs: [code-quality, test, docker-build, build]
    if: always()

    steps:
      - name: Check status
        run: |
          echo "CI finished with status: ${{ job.status }}"
