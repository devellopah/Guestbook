name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  code-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer, cs2pr

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Update dependencies for PHP 8.3
        run: |
          composer update --with-all-dependencies --no-progress --no-scripts --no-plugins --no-interaction
          composer install --no-progress --no-scripts --no-plugins --no-interaction

      - name: Validate composer
        run: composer validate --strict --no-check-publish

      - name: PHP lint
        run: |
          find src tests -name "*.php" -exec php -l {} \; | grep -v "No syntax errors detected" || true

      - name: PHPStan
        run: |
          vendor/bin/phpstan analyse src --error-format=github --no-progress || true

      - name: PHP CS Fixer
        run: |
          vendor/bin/php-cs-fixer fix --dry-run --diff --format=checkstyle | cs2pr || true

  security-scan:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.base.sha != github.event.pull_request.head.sha

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --no-verification --json
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    needs: [code-quality]

    strategy:
      matrix:
        php: ["8.3"]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: test
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
        ports:
          - 3306:3306

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: |
          composer update --with-all-dependencies --no-progress --no-scripts --no-plugins --no-interaction
          composer install --no-progress --no-scripts --no-plugins --no-interaction

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h127.0.0.1 -P3306 -uroot -ppassword --silent; then
              echo "MySQL is ready"
              break
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 5
          done

      - name: Run tests
        run: vendor/bin/phpunit --testdox
        continue-on-error: true

  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t app .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: app
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload scan results
        if: ${{ !github.event.pull_request.head.repo.fork && success() }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif

  build:
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: |
          composer update --with-all-dependencies --no-dev --no-progress --no-scripts --no-plugins --no-interaction
          composer install --no-dev --no-progress --no-scripts --no-plugins --no-interaction

      - name: Check index.php syntax
        run: php -l index.php
        continue-on-error: true

      - name: Check PHP files in src
        run: |
          find src -name "*.php" -exec php -l {} \; | grep -v "No syntax errors detected" || true

  notify:
    runs-on: ubuntu-latest
    needs: [code-quality, security-scan, test, docker-build, build]
    if: always()

    steps:
      - name: Check job statuses
        run: |
          echo "=== CI Pipeline Summary ==="
          echo "Code Quality: ${{ needs.code-quality.result }}"
          echo "Security Scan: ${{ needs.security-scan.result }}"
          echo "Tests: ${{ needs.test.result }}"
          echo "Docker Build: ${{ needs.docker-build.result }}"
          echo "Build: ${{ needs.build.result }}"

          if [[ "${{ needs.code-quality.result }}" == "failure" ]] || \
             [[ "${{ needs.security-scan.result }}" == "failure" ]] || \
             [[ "${{ needs.test.result }}" == "failure" ]] || \
             [[ "${{ needs.docker-build.result }}" == "failure" ]] || \
             [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "❌ Some jobs failed!"
            exit 1
          else
            echo "✅ All jobs completed successfully!"
          fi
